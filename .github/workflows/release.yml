# Release pipeline driven by Changesets.
#
# Authoring flow (a PR adding a feature):
#   1. Make the code change.
#   2. Run `pnpm changeset` and pick the affected packages + semver impact.
#   3. Commit the generated .changeset/*.md alongside the code.
#   4. Open the PR. Reviewer sees the changelog entry in the diff.
#
# Release flow (this workflow):
#   1. Pushes to main run the workflow.
#   2. If any .changeset/*.md files exist, changesets/action opens a PR
#      titled "Version Packages" that bumps versions in package.json,
#      updates each package's CHANGELOG.md, and deletes the consumed
#      changeset files.
#   3. Merging the Version Packages PR triggers this workflow again. This
#      time there are no pending changesets, so the action runs the
#      publish step instead: `pnpm release` → `changeset publish` → npm.
#   4. Each publish is signed with sigstore provenance so npmjs.com
#      renders a verified attestation badge linking the artifact to this
#      exact workflow run.
#
# Required secrets:
#   - NPM_TOKEN — automation token from npmjs.com with publish access
#     to the @reliableapp scope.
#
# Required permissions: id-token write (for provenance), contents write
# (to push the Version Packages branch + tags), pull-requests write
# (to open the PR).

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents:       write
  pull-requests:  write
  id-token:       write

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to determine which packages
          # changed since the last release.
          fetch-depth: 0

      # pnpm version is read from package.json#packageManager. Don't
      # set `version:` here — pnpm/action-setup errors out if both are
      # specified.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # npm 10 ships with Node 22 but only uses OIDC for provenance
      # attestation — the actual publish PUT still goes through
      # NPM_TOKEN. npm 11.5.1+ also routes the publish PUT through
      # the GitHub OIDC trusted-publisher flow, which is what we
      # configured on npmjs.com. Without this upgrade the trusted
      # publisher is never consulted and we get E404.
      - name: Upgrade npm to OIDC-capable version
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # If pending changesets exist on main, open / update a
          # Version Packages PR. If none exist (so the previous
          # Version PR was just merged), run the publish command.
          version: pnpm changeset version
          publish: pnpm release
          commit:  'chore(release): version packages'
          title:   'chore(release): version packages'
        env:
          # Prefer PAT for the Version Packages PR so push-from-bot
          # PRs trigger CI. Falls back to GITHUB_TOKEN if the secret
          # isn't set (publish-only flows still work in that case).
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT || secrets.GITHUB_TOKEN }}
          # NPM_TOKEN is required by changesets/action for its env
          # check, but the actual publish goes through OIDC trusted
          # publisher (configured on npmjs.com per package). The token
          # is no longer the publish auth path — it's a no-op as far
          # as registry writes go.
          NPM_TOKEN:    ${{ secrets.NPM_TOKEN }}
          # Provenance attaches a signed sigstore attestation linking
          # each artifact back to this exact workflow run. Visible as
          # a verified badge on npmjs.com.
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Summarise outcome
        if: always()
        run: |
          if [[ "${{ steps.changesets.outputs.published }}" == "true" ]]; then
            echo "📦 Published packages:"
            echo '${{ steps.changesets.outputs.publishedPackages }}'
          elif [[ "${{ steps.changesets.outputs.hasChangesets }}" == "true" ]]; then
            echo "📝 Version Packages PR opened or updated."
          else
            echo "ℹ️  No pending changesets and nothing to publish."
          fi
